include /opt/graduation-project/deploy/runtime/backend_upstream.conf;

server {
    listen 80;
    server_name api.paperpilot.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.paperpilot.cloud;

    ssl_certificate /etc/letsencrypt/live/api.paperpilot.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.paperpilot.cloud/privkey.pem;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /health {
        proxy_pass http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
