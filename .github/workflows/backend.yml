name: Backend CD

on:
  pull_request:
    paths:
      - 'BE/**'
      - 'docker-compose.prod.yml'
      - 'deploy/deploy.sh'
      - 'deploy/nginx/**'
      - 'deploy/env/backend.env.example'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
    paths:
      - 'BE/**'
      - 'docker-compose.prod.yml'
      - 'deploy/deploy.sh'
      - 'deploy/nginx/**'
      - 'deploy/env/backend.env.example'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Compile check
        run: uv run python -m compileall agents core crud models routers schemas services main.py

      - name: Alembic revision graph check
        run: uv run alembic heads

      - name: Build Docker image
        run: docker build -t graduation-project-be:test .

  deploy:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
      packages: write
    environment: production
    env:
      DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
      DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
      DEPLOY_STATE_DIR: ${{ vars.DEPLOY_STATE_DIR }}
      DEPLOY_UPSTREAM_FILE: ${{ vars.DEPLOY_UPSTREAM_FILE }}
      BACKEND_BLUE_PORT: ${{ vars.BACKEND_BLUE_PORT }}
      BACKEND_GREEN_PORT: ${{ vars.BACKEND_GREEN_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./BE
          file: ./BE/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/graduation-project-be:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/graduation-project-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on Oracle server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_APP_DIR='${DEPLOY_APP_DIR}' DEPLOY_COMPOSE_FILE='${DEPLOY_COMPOSE_FILE}' DEPLOY_STATE_DIR='${DEPLOY_STATE_DIR}' DEPLOY_UPSTREAM_FILE='${DEPLOY_UPSTREAM_FILE}' BACKEND_BLUE_PORT='${BACKEND_BLUE_PORT}' BACKEND_GREEN_PORT='${BACKEND_GREEN_PORT}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' DEPLOY_IMAGE_TAG='sha-${{ github.sha }}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          APP_DIR="${DEPLOY_APP_DIR:-/opt/graduation-project}"
          COMPOSE_FILE="${DEPLOY_COMPOSE_FILE:-${APP_DIR}/docker-compose.prod.yml}"
          STATE_DIR="${DEPLOY_STATE_DIR:-${APP_DIR}/deploy/runtime}"
          UPSTREAM_FILE="${DEPLOY_UPSTREAM_FILE:-${STATE_DIR}/backend_upstream.conf}"

          if [ ! -d "${APP_DIR}/.git" ]; then
            echo "Repository is missing at ${APP_DIR}"
            exit 1
          fi
          cd "${APP_DIR}"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          chmod +x deploy/deploy.sh
          APP_DIR="${APP_DIR}" \
          COMPOSE_FILE="${COMPOSE_FILE}" \
          STATE_DIR="${STATE_DIR}" \
          UPSTREAM_FILE="${UPSTREAM_FILE}" \
          BACKEND_BLUE_PORT="${BACKEND_BLUE_PORT:-18001}" \
          BACKEND_GREEN_PORT="${BACKEND_GREEN_PORT:-18002}" \
          bash deploy/deploy.sh "${DEPLOY_IMAGE_TAG}"
          echo "Remote deploy command completed"
          REMOTE_SCRIPT
