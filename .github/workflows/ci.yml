name: CI

on:
  pull_request:
    paths:
      - 'FE/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'FE/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: FE/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.paperpilot.cloud/api/v1
        run: npm run build
