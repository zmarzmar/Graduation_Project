services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_research_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  chromadb:
    image: chromadb/chroma:latest
    container_name: ai_research_chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend_net

  backend_blue:
    image: ghcr.io/${GHCR_OWNER}/graduation-project-be:${BACKEND_IMAGE_TAG:-latest}
    container_name: ai_research_backend_blue
    restart: unless-stopped
    env_file:
      - ./deploy/env/backend.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      APP_COLOR: blue
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_BLUE_PORT:-18001}:8000"
    networks:
      - backend_net

  backend_green:
    image: ghcr.io/${GHCR_OWNER}/graduation-project-be:${BACKEND_IMAGE_TAG:-latest}
    container_name: ai_research_backend_green
    restart: unless-stopped
    env_file:
      - ./deploy/env/backend.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      APP_COLOR: green
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_GREEN_PORT:-18002}:8000"
    networks:
      - backend_net

  dozzle:
    image: amir20/dozzle:latest
    container_name: ai_research_dozzle
    profiles:
      - monitoring
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DOZZLE_PORT:-18090}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend_net

  adminer:
    image: adminer:latest
    container_name: ai_research_adminer
    profiles:
      - monitoring
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADMINER_PORT:-18080}:8080"
    networks:
      - backend_net

  prometheus:
    image: prom/prometheus:latest
    container_name: ai_research_prometheus
    profiles:
      - monitoring
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai_research_node_exporter
    profiles:
      - monitoring
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ai_research_cadvisor
    profiles:
      - monitoring
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend_net

  grafana:
    image: grafana/grafana-oss:12.3.0
    container_name: ai_research_grafana
    profiles:
      - monitoring
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_before_use}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-13000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
  prometheus_data:
  grafana_data:
